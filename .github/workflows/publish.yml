name: Publish Package

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "tsconfig.json"
      - "vite.config.ts"
      - ".github/workflows/publish.yml"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://npm.pkg.github.com
          scope: "@motioncomplex"

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Run build
        run: npm run build

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Commit built files and version bump
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild tokens + bump version [skip ci]"
          file_pattern: "build/css/base.css build/css/theme-void.css build/css/theme-nebula.css build/css/theme-crimson.css build/css/theme-aurora.css build/ts/tokens.ts package.json package-lock.json"

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is missing or empty. Add a GitHub PAT (classic) with write:packages in Settings → Secrets and variables → Actions as NPM_TOKEN."
            exit 1
          fi
          npm publish
